<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .toggle-link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <div id="login-form">
        <h2>Login</h2>
        <input type="text" placeholder="Username/Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div class="toggle-link">
            Account nei? <a href="#" onclick="toggleForm()">Sign Up korun</a>
        </div>
    </div>

    <div id="signup-form" style="display: none;">
        <h2>Sign Up</h2>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="New Password" required>
        <input type="password" placeholder="Confirm Password" required>
        <button type="submit" style="background-color: #007bff;">Create Account</button>
        <div class="toggle-link">
            Agei account ache? <a href="#" onclick="toggleForm()">Login korun</a>
        </div>
    </div>
</div>

<script>
    function toggleForm() {
        const login = document.getElementById('login-form');
        const signup = document.getElementById('signup-form');
        if (login.style.display === "none") {
            login.style.display = "block";
            signup.style.display = "none";
        } else {
            login.style.display = "none";
            signup.style.display = "block";
        }
    }
</script>

</body>
</html>
