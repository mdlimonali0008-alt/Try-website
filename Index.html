<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Design</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; }
        .header { background: #333; padding: 20px; font-size: 24px; font-weight: bold; color: gold; }
        .hero-section { padding: 50px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('your-image.jpg'); background-size: cover; }
        .btn-join { background: #ffcc00; color: black; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block; margin-top: 20px; }
        .login-box { margin-top: 30px; background: #222; padding: 20px; border-radius: 10px; display: inline-block; }
        input { display: block; width: 250px; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div class="header">DK33 GAMING</div>

    <div class="hero-section">
        <h1>Welcome to Our Platform</h1>
        <p>Sign up today and get rewards!</p>
        
        <div class="login-box">
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <a href="#" class="btn-join">LOG IN</a>
        </div>
        <br>
        <a href="#" style="color: #007bff; text-decoration: none; margin-top: 10px; display: inline-block;">Create New Account</a>
    </div>

</body>
</html>
