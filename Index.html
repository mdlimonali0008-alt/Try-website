<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royale | Win Big</title>
    <style>
        /* Basic Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0e11; color: #fff; }

        /* Header & Logo */
        header { background: #1c2127; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f3ba2f; }
        .logo { font-size: 24px; font-weight: bold; color: #f3ba2f; text-transform: uppercase; }

        /* Hero Section */
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1200x400'); background-size: cover; }
        .hero h1 { font-size: 3rem; color: #f3ba2f; margin-bottom: 10px; }

        /* Auth Buttons */
        .auth-container { background: rgba(28, 33, 39, 0.9); padding: 30px; border-radius: 15px; display: inline-block; margin-top: 20px; border: 1px solid #333; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin: 5px; }
        .btn-login { background-color: transparent; border: 1px solid #f3ba2f; color: #f3ba2f; }
        .btn-signup { background-color: #f3ba2f; color: #000; }
        .btn:hover { opacity: 0.8; }

        /* Game Grid */
        .game-section { padding: 40px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .game-card { background: #1c2127; border-radius: 10px; padding: 20px; border: 1px solid #333; transition: 0.3s; }
        .game-card:hover { border-color: #f3ba2f; transform: translateY(-5px); }
        .game-card i { font-size: 40px; display: block; margin-bottom: 10px; }

        footer { background: #0b0e11; padding: 20px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <div class="logo">CASINO<span>777</span></div>
    <div>
        <a href="#" class="btn btn-login">Login</a>
    </div>
</header>

<section class="hero">
    <h1>WIN BIG TODAY!</h1>
    <p>Get 100% Welcome Bonus on your first deposit.</p>
    
    <div class="auth-container">
        <h3>Join the Action</h3>
        <a href="#" class="btn btn-signup">Create Free Account</a>
        <p style="font-size: 12px; margin-top: 10px; color: #aaa;">18+ | Play Responsibly</p>
    </div>
</section>

<section class="game-section">
    <h2>Popular Games</h2>
    <div class="grid">
        <div class="game-card">🎰<br>Slots</div>
        <div class="game-card">🃏<br>Poker</div>
        <div class="game-card">🎡<br>Roulette</div>
        <div class="game-card">🎲<br>Dice</div>
        <div class="game-card">⚽<br>Sports</div>
    </div>
</section>

<footer>
    <p>&copy; 2026 Casino Royale Group. All Rights Reserved.</p>
</footer>

</body>
</html>
